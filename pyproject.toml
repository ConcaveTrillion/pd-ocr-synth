# output/: PLW2901/PERF401/RET504 patterns
"src/pd_ocr_synth/output/detection.py" = ["ANN", "D", "G", "BLE", "TRY", "TC", "PERF401", "PLW2901"]
"src/pd_ocr_synth/output/recognition.py" = ["ANN", "D", "G", "BLE", "TRY", "TC", "PLW2901", "RET504"]
