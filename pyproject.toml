"src/pd_ocr_synth/corpus/context.py" = ["ANN", "D", "TC"]
"src/pd_ocr_synth/corpus/parsers.py" = ["ANN", "D", "G", "BLE", "TRY", "TC"]
"src/pd_ocr_synth/corpus/filters.py" = ["ANN", "D", "G", "BLE", "TRY", "TC"]
"src/pd_ocr_synth/corpus/http.py" = ["ANN", "D", "G", "BLE", "TRY", "TC", "S"]
"src/pd_ocr_synth/corpus/wikisource.py" = ["ANN", "D", "G", "BLE", "TRY", "TC"]
